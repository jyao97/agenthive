<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="38%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0c5fa3"/>
    </linearGradient>
    <radialGradient id="glass" cx="0.3" cy="0.15" r="0.75">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="35%" stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glass)"/>

  <!-- Robot scaled to 70% and centered — fits within 409×409 maskable safe zone -->
  <g transform="translate(256,256) scale(0.70) translate(-256,-263)"
     fill="none" stroke="#fff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="256" cy="44" r="16" fill="#fff" stroke="none"/>
    <line x1="256" y1="60" x2="256" y2="128"/>
    <rect x="62" y="128" width="388" height="290" rx="48"/>
    <circle cx="183" cy="273" r="36" fill="#fff" stroke="none"/>
    <circle cx="329" cy="273" r="36" fill="#fff" stroke="none"/>
    <line x1="158" y1="418" x2="158" y2="486"/>
    <line x1="354" y1="418" x2="354" y2="486"/>
  </g>
</svg>
